<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <!-- css -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/cores.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="icon" type="image/png" href="icon.png">

    <!-- Javascript -->
    <script src="js/calculadora.js" defer></script>
    <script src="js/main.js" defer></script>
</head>
<body>

    <!-- Calculadora box -->
    <div id="container">
        <!-- Painel -->
        <div id="tela" class="px-3">
            <h5 id="tela-operador" class="c-white"></h5>
            <h5 id="score" class="c-white">0</h5>
        </div>

        <!-- box de todos os numeros abaixo do painel -->
        <div id="head-numbers">

            <!-- botoes reset e enter -->
            <div id="mainbuttons">
                <button class="bt-main btR buttonMain">Reset</button>
                <button class="bt-main btE buttonMain">Enter</button>
            </div>

            <!-- botoes com os numeros -->
        <div id="num-op" class="d-flex">
            <div id="numbers">
            <button class="bt bt0 buttonNum">0</button>
            <button class="bt bt1 buttonNum">1</button>
            <button class="bt bt2 buttonNum">2</button>
            <button class="bt bt3 buttonNum">3</button>
            <button class="bt bt4 buttonNum">4</button>
            <button class="bt bt5 buttonNum">5</button>
            <button class="bt bt6 buttonNum">6</button>
            <button class="bt bt7 buttonNum">7</button>
            <button class="bt bt8 buttonNum">8</button>
            <button class="bt bt9 buttonNum">9</button>
            <button class="btX buttonMain">X</button>
        </div>

        <!-- botoes com os operadores -->
        <div id="ops">
            <button class="op op+ buttonOPS">+</button>
            <button class="op op- buttonOPS">-</button>
            <button class="op op* buttonOPS">*</button>
            <button class="op op/ buttonOPS">/</button>
        </div>

     </div>

        </div>

    </div>
   
</body>
</html>
